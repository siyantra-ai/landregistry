<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 90" role="img" aria-labelledby="title">
  <title>Landregistrytransfers.com</title>
  
  <!-- Icon Group: Document + Location Pin -->
  <g transform="translate(15, 2)">
    <!-- Document outline in Forest Green -->
    <path 
      d="M 22 14 H 42 L 50 22 V 58 C 50 60, 48 62, 46 62 H 22 C 20 62, 18 60, 18 58 V 18 C 18 16, 20 14, 22 14 Z" 
      fill="none" 
      stroke="#2F4F46" 
      stroke-width="3.5" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />
    
    <!-- Document folded corner -->
    <path 
      d="M 42 14 V 22 H 50" 
      fill="none" 
      stroke="#2F4F46" 
      stroke-width="3.5" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />
    
    <!-- Document text lines -->
    <line x1="24" y1="30" x2="44" y2="30" stroke="#2F4F46" stroke-width="3" stroke-linecap="round" />
    <line x1="24" y1="38" x2="44" y2="38" stroke="#2F4F46" stroke-width="3" stroke-linecap="round" />
    <line x1="24" y1="46" x2="34" y2="46" stroke="#2F4F46" stroke-width="3" stroke-linecap="round" />

    <!-- White silhouette mask layer for location pin separation -->
    <path 
      d="M 50 42 C 45 42, 41 46, 41 51 C 41 58, 50 68, 50 68 C 50 68, 59 58, 59 51 C 59 46, 55 42, 50 42 Z" 
      fill="#ffffff" 
      stroke="#ffffff" 
      stroke-width="5" 
      stroke-linejoin="round"
    />
    
    <!-- Gold Location Pin Teardrop -->
    <path 
      d="M 50 42 C 45 42, 41 46, 41 51 C 41 58, 50 68, 50 68 C 50 68, 59 58, 59 51 C 59 46, 55 42, 50 42 Z" 
      fill="#C7A25A" 
    />
    
    <!-- Pin Center White Dot -->
    <circle cx="50" cy="51" r="2.5" fill="#ffffff" />
  </g>
  
  <!-- Typography next to the icon -->
  <text 
    x="95" 
    y="58" 
    font-family="'Poppins', 'Inter', 'Segoe UI', sans-serif" 
    font-size="44" 
    font-weight="600" 
    fill="#2F4F46" 
    letter-spacing="-0.02em"
  >
    Landregistry<tspan fill="#C7A25A">transfers.com</tspan>
  </text>
