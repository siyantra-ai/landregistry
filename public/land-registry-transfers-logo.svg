<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 90" role="img" aria-labelledby="title">
  <title>Land Registry Transfers</title>
  <!-- Brand Icon -->
  <g transform="translate(10, 5)">
    <!-- Shield / House Background -->
    <path d="M 40 5 C 19.3 5 5 19.3 5 40 C 5 60.7 19.3 75 40 75 C 60.7 75 75 60.7 75 40 C 75 19.3 60.7 5 40 5 Z" fill="url(#grad-icon)" opacity="0.1" />
    
    <!-- Outer Ring -->
    <circle cx="40" cy="40" r="35" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="6 3 1 3" />
    
    <!-- Document 1 (Source) -->
    <rect x="24" y="22" width="22" height="30" rx="3" fill="#ffffff" stroke="#1d4ed8" stroke-width="2" />
    <line x1="29" y1="28" x2="41" y2="28" stroke="#1d4ed8" stroke-width="1.5" stroke-linecap="round" />
    <line x1="29" y1="34" x2="41" y2="34" stroke="#1d4ed8" stroke-width="1.5" stroke-linecap="round" />
    <line x1="29" y1="40" x2="36" y2="40" stroke="#1d4ed8" stroke-width="1.5" stroke-linecap="round" />
    
    <!-- Document 2 (Destination / Overlapping) -->
    <rect x="34" y="30" width="22" height="30" rx="3" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow-drop)" />
    <line x1="39" y1="36" x2="51" y2="36" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" />
    <line x1="39" y1="42" x2="51" y2="42" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" />
    <line x1="39" y1="48" x2="46" y2="48" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" />

    <!-- Swooshing Transfer Arrow -->
    <path d="M 22 52 C 22 58, 28 62, 38 62" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" />
    <path d="M 38 62 L 34 58 M 38 62 L 34 66" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" />
  </g>
  
  <!-- Typography using robust relative tspan positioning -->
  <text x="105" y="58" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="44" font-weight="700" letter-spacing="0.02em" fill="#0f172a">
    LAND REGISTRY <tspan fill="#2563eb" font-weight="800" letter-spacing="0.04em">TRANSFERS</tspan>
  </text>

  <!-- Gradients & Filters -->
  <defs>
    <linearGradient id="grad-icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="shadow-drop" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
  </defs>
</svg>
