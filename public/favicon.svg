<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="fav-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>
  
  <!-- Circle shape -->
  <circle cx="24" cy="24" r="22" fill="url(#fav-grad)" />
  
  <!-- Outer dotted/dashed ring -->
  <circle cx="24" cy="24" r="19" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.6" />

  <!-- Document 1 -->
  <rect x="15" y="13" width="13" height="18" rx="1.5" fill="#ffffff" opacity="0.85" />
  <line x1="18" y1="17" x2="25" y2="17" stroke="#1d4ed8" stroke-width="1.2" stroke-linecap="round" />
  <line x1="18" y1="21" x2="25" y2="21" stroke="#1d4ed8" stroke-width="1.2" stroke-linecap="round" />
  <line x1="18" y1="25" x2="22" y2="25" stroke="#1d4ed8" stroke-width="1.2" stroke-linecap="round" />

  <!-- Document 2 (Overlapping/Active) -->
  <rect x="21" y="17" width="13" height="18" rx="1.5" fill="#ffffff" />
  <line x1="24" y1="21" x2="31" y2="21" stroke="#2563eb" stroke-width="1.2" stroke-linecap="round" />
  <line x1="24" y1="25" x2="31" y2="25" stroke="#2563eb" stroke-width="1.2" stroke-linecap="round" />
  <line x1="24" y1="29" x2="28" y2="29" stroke="#2563eb" stroke-width="1.2" stroke-linecap="round" />

  <!-- Transfer Arrow (Slight curve) -->
  <path d="M 13 33 C 13 36, 17 38, 23 38" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" />
  <path d="M 23 38 L 20 35 M 23 38 L 20 41" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" />
</svg>
